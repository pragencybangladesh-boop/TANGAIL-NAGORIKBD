<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sylhet Nagorik BD</title>
    <meta name="description" content="Official Digital Public Infrastructure platform for Sylhet District." />
    <meta name="theme-color" content="#059669" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nagorikbd.sylhet" />
    <meta property="og:title" content="Sylhet Nagorik BD" />
    <meta property="og:description" content="Accurate information about govt services, upazila details, and smart AI assistance." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sylhet Nagorik BD" />
    <meta name="twitter:description" content="Accurate information about govt services, upazila details, and smart AI assistance." />
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'bn',
          includedLanguages: 'en,bn',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <style>
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      body { top: 0px !important; }
      .goog-logo-link { display: none !important; }
      .goog-te-gadget { color: transparent !important; }
      #google_translate_element { display: none; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
